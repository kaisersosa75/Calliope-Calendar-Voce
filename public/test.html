<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Calendar — Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 32px; }
    textarea { width: 100%; padding: 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 12px 20px; font-size: 1rem; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #aaa !important; }
    .blue { background: #4285F4; }
    .red { background: #DB4437; }
    .green { background: #0F9D58; }
    pre { background: #f4f4f4; padding: 16px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; margin-top: 20px; }
    .hint { color: #666; font-size: 0.9rem; }
    hr { margin: 32px 0; border: none; border-top: 1px solid #eee; }
    #status { font-weight: bold; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Voice Calendar — Test</h1>

  <h2>Da testo</h2>
  <p class="hint">Scrivi un appuntamento a parole, poi premi il pulsante.</p>
  <textarea id="text" rows="2">Dentista domani alle 15 per un'ora</textarea>
  <br>
  <button id="btnText" class="blue">Crea da testo</button>

  <hr>

  <h2>Da voce</h2>
  <p class="hint">Premi "Registra", parla (es. "Riunione giovedì alle 10"), poi "Ferma e invia".</p>
  <button id="btnRec" class="red">🎤 Registra</button>
  <button id="btnStop" class="green" disabled>⏹ Ferma e invia</button>
  <div id="status"></div>

  <pre id="out">La risposta apparirà qui…</pre>

  <script>
    const out = document.getElementById('out');
    const status = document.getElementById('status');

    // --- Da testo ---
    const btnText = document.getElementById('btnText');
    btnText.addEventListener('click', async () => {
      btnText.disabled = true;
      out.textContent = 'Invio in corso…';
      try {
        const res = await fetch('/appointment/text', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: document.getElementById('text').value }),
        });
        out.textContent = JSON.stringify(await res.json(), null, 2);
      } catch (err) {
        out.textContent = 'Errore: ' + err.message;
      } finally {
        btnText.disabled = false;
      }
    });

    // --- Da voce ---
    const btnRec = document.getElementById('btnRec');
    const btnStop = document.getElementById('btnStop');
    let mediaRecorder, chunks = [], recMime = 'audio/webm';

    btnRec.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Scegli un formato esplicito che il browser supporta
        const mime = MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
        recMime = mime || 'audio/webm';
        mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
        chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.start();
        status.textContent = '🔴 Registrazione in corso…';
        btnRec.disabled = true;
        btnStop.disabled = false;
      } catch (err) {
        status.textContent = 'Microfono non accessibile: ' + err.message;
      }
    });

    btnStop.addEventListener('click', () => {
      mediaRecorder.onstop = async () => {
        mediaRecorder.stream.getTracks().forEach((t) => t.stop());
        const blob = new Blob(chunks, { type: recMime });
        status.textContent = 'Trascrizione e invio in corso…';
        out.textContent = '…';

        const ext = recMime.includes('mp4') ? 'mp4' : 'webm';
        const form = new FormData();
        form.append('audio', blob, 'audio.' + ext);
        try {
          const res = await fetch('/appointment/voice', {
            method: 'POST',
            credentials: 'include',
            body: form,
          });
          out.textContent = JSON.stringify(await res.json(), null, 2);
          status.textContent = '';
        } catch (err) {
          out.textContent = 'Errore: ' + err.message;
          status.textContent = '';
        }
        btnRec.disabled = false;
        btnStop.disabled = true;
      };
      mediaRecorder.stop();
    });
  </script>
</body>
</html>
